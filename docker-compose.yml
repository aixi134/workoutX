services:
  postgres:
    image: postgres:16-alpine
    container_name: workoutx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workoutx
      POSTGRES_USER: workoutx
      POSTGRES_PASSWORD: workoutx
    ports:
      - "5432:5432"
    volumes:
      - workoutx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workoutx -d workoutx"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:22-alpine
    container_name: workoutx-app
    working_dir: /app
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://workoutx:workoutx@postgres:5432/workoutx?schema=public"
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "8388:3000"
    volumes:
      - .:/app
      - workoutx-node-modules:/app/node_modules
      - workoutx-next-cache:/app/.next
      - workoutx-npm-cache:/root/.npm
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run build && npm run start -- --hostname 0.0.0.0"

volumes:
  workoutx-postgres-data:
  workoutx-node-modules:
  workoutx-next-cache:
  workoutx-npm-cache:
